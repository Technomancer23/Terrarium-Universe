      <section class="subhero reveal">
        <div class="subtext">
          <span class="kicker">Food & Feeding</span>
          <h1>食物与喂养</h1>
          <p>
            不同爬宠的食物系统差异很大。这个页面负责把“昆虫、果泥、冻饲、补剂”拆开讲。
          </p>
        </div>
        <div class="subvis food-visual">
          <img src="images/food-feeding-banner.png" alt="Reptile food and feeding illustration" />
        </div>
      </section>
      <section class="section reveal">
        <div class="grid">
          <div class="card">
            <span class="num">01</span>
            <h3>昆虫</h3>
            <p>
              蟋蟀、杜比亚、面包虫、大麦虫等，常见于豹纹守宫和部分蜥蜴喂养。
            </p>
          </div>
          <div class="card">
            <span class="num">02</span>
            <h3>果泥</h3>
            <p>睫角守宫常用成品果泥，但仍需注意营养、频率和保存。</p>
          </div>
          <div class="card">
            <span class="num">03</span>
            <h3>冻饲</h3>
            <p>蛇类常见食物系统，需要正确解冻、加温，并接受其食物类型。</p>
          </div>
        </div>
      </section>
